<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pokemon GBC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      touch-action: none;
      background: #0d0d1a;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 1fr 320px 1fr;
      align-items: center;
      justify-items: center;
      gap: 18px;
      padding: 12px;
    }

    #game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    h1 {
      font-size: 18px;
      color: #f0c040;
      text-shadow: 0 0 10px #f0c04088;
      letter-spacing: 2px;
    }

    #screen-wrapper {
      position: relative;
      border: 3px solid #f0c040;
      border-radius: 8px;
      box-shadow: 0 0 20px #f0c04044;
      background: #000;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: min(46vw, 480px);
      height: min(41.4vw, 432px);
      min-width: 320px;
      min-height: 288px;
      background: #000;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000000dd;
      border-radius: 5px;
      gap: 12px;
      padding: 20px;
      text-align: center;
    }

    #rom-file { display: none; }

    .rom-btn {
      width: 230px;
      padding: 12px 24px;
      border: 2px solid #f0c040;
      border-radius: 6px;
      background: #1f325f;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .rom-btn:active, .control-btn:active { transform: scale(0.95); }

    #status {
      min-height: 18px;
      color: #cfcfcf;
      font-size: 12px;
      line-height: 1.4;
    }

    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 58px);
      gap: 5px;
    }

    #actions {
      display: grid;
      grid-template-columns: repeat(2, 68px);
      gap: 18px;
      align-items: center;
      justify-content: center;
    }

    #meta {
      display: flex;
      gap: 16px;
      margin-top: 10px;
    }

    .control-btn {
      border: 2px solid #45455d;
      border-radius: 10px;
      color: #fff;
      background: #222235;
      font-size: 16px;
      font-weight: bold;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }

    .empty { opacity: 0; pointer-events: none; }
    .round { width: 68px; height: 68px; border-radius: 50%; }
    .a { background: #cc0000; border-color: #ff5555; }
    .b { background: #0044cc; border-color: #4488ff; }
    .meta { padding: 10px 20px; border-radius: 999px; font-size: 12px; }

    @media (max-width: 760px) {
      body {
        grid-template-columns: 180px 1fr 170px;
        gap: 8px;
      }

      canvas {
        width: 320px;
        height: 288px;
        min-width: 320px;
        min-height: 288px;
      }

      #dpad {
        grid-template-columns: repeat(3, 48px);
        grid-template-rows: repeat(3, 48px);
      }
    }
  </style>
</head>
<body>
  <div id="dpad">
    <button class="control-btn empty"></button>
    <button class="control-btn" data-key="up">UP</button>
    <button class="control-btn empty"></button>
    <button class="control-btn" data-key="left">LEFT</button>
    <button class="control-btn empty"></button>
    <button class="control-btn" data-key="right">RIGHT</button>
    <button class="control-btn empty"></button>
    <button class="control-btn" data-key="down">DOWN</button>
    <button class="control-btn empty"></button>
  </div>

  <main id="game-area">
    <h1>POKEMON GBC</h1>
    <div id="screen-wrapper">
      <canvas id="screen" width="160" height="144"></canvas>
      <div id="overlay">
        <input id="rom-file" type="file" accept=".gb,.gbc,application/octet-stream">
        <button class="rom-btn" id="choose-rom">Pilih ROM dari HP</button>
        <div id="status">Pilih file ROM .gb atau .gbc untuk mulai</div>
      </div>
    </div>
    <div id="meta">
      <button class="control-btn meta" data-key="select">SELECT</button>
      <button class="control-btn meta" data-key="start">START</button>
    </div>
  </main>

  <div id="actions">
    <button class="control-btn round b" data-key="b">B</button>
    <button class="control-btn round a" data-key="a">A</button>
  </div>

  <script src="js/other/base64.js"></script>
  <script src="js/other/resampler.js"></script>
  <script src="js/other/XAudioServer.js"></script>
  <script src="js/GameBoyCore.js"></script>
  <script>
    var DEBUG_MESSAGES = false;
    var DEBUG_WINDOWING = false;

    function cout(message, colorIndex) {
      if (colorIndex > 0) console.log(message);
    }

    function findValue(key) {
      try { return localStorage.getItem(key); } catch (error) { return null; }
    }

    function setValue(key, value) {
      try { localStorage.setItem(key, value); } catch (error) {}
    }

    function deleteValue(key) {
      try { localStorage.removeItem(key); } catch (error) {}
    }
  </script>
  <script src="js/GameBoyIO.js"></script>

  <script>
    var statusNode = document.getElementById('status');
    var overlayNode = document.getElementById('overlay');
    var canvasNode = document.getElementById('screen');
    var fileNode = document.getElementById('rom-file');
    var chooseNode = document.getElementById('choose-rom');

    if (typeof settings !== 'undefined') {
      settings[0] = false;
      settings[1] = false;
      settings[4] = true;
    }

    function setStatus(message) {
      statusNode.textContent = message;
    }

    function startROMFromBuffer(buffer, name) {
      var bytes = new Uint8Array(buffer);
      var romData = '';
      var chunkSize = 8192;
      for (var index = 0; index < bytes.length; index += chunkSize) {
        romData += String.fromCharCode.apply(null, bytes.subarray(index, index + chunkSize));
      }
      start(canvasNode, romData);
      overlayNode.style.display = 'none';
      setStatus('Berjalan: ' + name);
    }

    chooseNode.addEventListener('click', function() {
      fileNode.click();
    });

    fileNode.addEventListener('change', function() {
      var file = fileNode.files && fileNode.files[0];
      if (!file) return;

      setStatus('Memuat ' + file.name + '...');
      file.arrayBuffer()
        .then(function(buffer) { startROMFromBuffer(buffer, file.name); })
        .catch(function(error) {
          setStatus('Gagal membaca ROM');
          console.error(error);
        });
    });

    function press(key, down) {
      if (down) {
        GameBoyKeyDown(key);
      } else {
        GameBoyKeyUp(key);
      }
    }

    function bindButton(button) {
      var key = button.getAttribute('data-key');
      if (!key) return;

      function down(event) {
        event.preventDefault();
        press(key, true);
      }

      function up(event) {
        event.preventDefault();
        press(key, false);
      }

      button.addEventListener('touchstart', down, { passive: false });
      button.addEventListener('touchend', up, { passive: false });
      button.addEventListener('touchcancel', up, { passive: false });
      button.addEventListener('mousedown', down);
      button.addEventListener('mouseup', up);
      button.addEventListener('mouseleave', up);
    }

    document.querySelectorAll('[data-key]').forEach(bindButton);

    document.addEventListener('keydown', function(event) {
      var map = {
        ArrowRight: 'right',
        ArrowLeft: 'left',
        ArrowUp: 'up',
        ArrowDown: 'down',
        KeyX: 'a',
        KeyZ: 'b',
        Enter: 'start',
        ShiftLeft: 'select',
        ShiftRight: 'select'
      };
      if (map[event.code]) {
        event.preventDefault();
        press(map[event.code], true);
      }
    });

    document.addEventListener('keyup', function(event) {
      var map = {
        ArrowRight: 'right',
        ArrowLeft: 'left',
        ArrowUp: 'up',
        ArrowDown: 'down',
        KeyX: 'a',
        KeyZ: 'b',
        Enter: 'start',
        ShiftLeft: 'select',
        ShiftRight: 'select'
      };
      if (map[event.code]) {
        event.preventDefault();
        press(map[event.code], false);
      }
    });
  </script>
</body>
</html>
